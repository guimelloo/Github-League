services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: github_league_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: github_league
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel_secret
      MYSQL_ROOT_HOST: '%'
    ports:
      - "33061:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # PHP-FPM Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: github_league_app
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:a2p9ZGvsUFqxDZRyzS6YqY5pVTmHuEeLc9FFYrfWQW8=
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: github_league
      DB_USERNAME: laravel
      DB_PASSWORD: laravel_secret
      SESSION_DRIVER: database
      CACHE_STORE: database
    volumes:
      - .:/var/www
      - /var/www/vendor
      - /var/www/node_modules
    ports:
      - "9000:9000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_network
    command: >
      sh -c "
      php artisan migrate --force &&
      php-fpm
      "

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: github_league_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - app
    networks:
      - app_network

  # Node.js for Vite (assets compilation)
  node:
    image: node:20-alpine
    container_name: github_league_node
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    networks:
      - app_network

  # Laravel Scheduler
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: github_league_scheduler
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:a2p9ZGvsUFqxDZRyzS6YqY5pVTmHuEeLc9FFYrfWQW8=
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: github_league
      DB_USERNAME: laravel
      DB_PASSWORD: laravel_secret
      SESSION_DRIVER: database
      CACHE_STORE: database
    volumes:
      - .:/var/www
      - /var/www/vendor
      - /var/www/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - app_network
    command: >
      sh -c "
      while true; do
        php artisan schedule:run --verbose --no-interaction
        sleep 60
      done
      "

volumes:
  mysql_data:
    driver: local

networks:
  app_network:
    driver: bridge
